name: Deploy Wiki Site

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'app/src/main/assets/data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r wiki/requirements.txt

      - name: Generate HTML site
        run: python -m wiki.src write-html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out/IdleFantasy-site
          cname: idlefantasy.tristinbaker.xyz
